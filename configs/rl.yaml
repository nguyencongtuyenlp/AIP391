state:
  grid_size: 16
  low_conf_threshold: 0.5
  proposal_min_conf: 0.01
  proposal_max_conf: 0.5
  proposal_peak_conf: 0.25
  small_area_ratio: 0.01
  count_norm: 100.0
  roi_count_norm: 50.0
  slice_count_norm: 10.0
  spatial_feature_channels: 4

env:
  max_steps: 20
  max_slices: 8
  initial_slice_fraction: 0.35
  move_fraction: 0.30
  zoom_factor: 0.75
  min_slice_fraction: 0.12
  max_slice_fraction: 0.45
  max_roi_area_ratio: 0.20
  min_scale_gain: 2.0
  reward_imgsz: 320
  target_projected_size: 32.0
  min_projected_size: 12.0
  max_projected_size: 96.0
  context_margin: 0.08
  high_conf_threshold: 0.5
  old_slice_overlap_threshold: 0.5
  min_new_hits_to_accept: 1
  use_simplified_reward: true
  target_reward: 3.0
  efficiency_weight: 0.5
  constraint_weight: 3.0
  stop_bonus_weight: 1.5
  step_penalty: 0.03
  empty_slice_penalty: 0.5
  area_penalty: 0.35
  detected_overlap_penalty: 1.0
  new_hard_reward: 2.0
  hard_density_reward: 0.8
  compactness_reward: 0.8
  observable_target_reward: 0.25
  continue_target_penalty: 0.6
  max_steps_without_stop_penalty: 4.0
  stalled_without_stop_penalty: 4.0
  stop_target_reward: 1.2
  stop_observable_target_reward: 0.4
  stop_early_penalty: 0.8
  large_roi_penalty: 2.0
  low_scale_penalty: 1.0
  old_slice_overlap_penalty: 3.0
  nav_shaping_weight: 0.0
  shaping_gamma: 0.95
  density_potential_obj_weight: 0.25
  density_potential_min_count: 2

train:
  episodes: 20000
  batch_size: 128
  replay_size: 50000
  gamma: 0.95
  lr: 0.0001
  min_replay: 512
  target_update: 200
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 15000
  guide_prob_start: 0.25
  guide_prob_end: 0.05
  guide_decay_steps: 15000
  n_step: 3
  num_envs: 8
  hidden_dim: 512
  use_spatial_cnn: true
  double_dqn: true
  dueling: true
  reward_clip: 10.0
  optimize_every: 2
  preload_cache: true
  seed: 42
  log_interval: 25
  val_split: val
  eval_interval: 500
  eval_episodes: 256
  eval_slice_cost_weight: 0.05
  eval_benchmark_images: 500
  eval_map_weight: 1.0
  eval_small_recall_weight: 1.0
  eval_fp_cost_weight: 0.01
  device: ""
  use_soft_update: true
  tau: 0.005
  use_per: true
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_frames: 100000
  use_curriculum: true
  curriculum_steps: 15000
